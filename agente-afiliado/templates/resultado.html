<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Perfil de Emagrecimento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        h2 {
            color: #f0f0f0;
            margin-bottom: 15px;
        }
        p {
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .profile-name {
            font-size: 1.5em;
            color: #4CAF50;
            margin-bottom: 10px;
        }
        .offer-link {
            background-color: #4CAF50;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            transition: background-color 0.3s ease;
            display: inline-block;
            margin-top: 20px;
        }
        .offer-link:hover {
            background-color: #45a049;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input[type="text"],
        .form-group input[type="email"] {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #333;
            color: #f0f0f0;
        }
        .form-group input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .form-group input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Parabéns, você completou o quiz!</h1>
        <h2>Seu Perfil de Emagrecimento:</h2>
        <p class="profile-name">{{ profile.name }}</p>
        <p>{{ profile.description }}</p>

        <h3>Cadastre-se para receber sua oferta personalizada!</h3>
        <form id="lead-form" method="POST" action="/salvar-lead">
            <div class="form-group">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <input type="hidden" name="profile_result" value="{{ profile_key }}">
            <div class="form-group">
                <input type="submit" value="Receber Oferta">
            </div>
        </form>

        {% if offer_submitted %}
            <p>Obrigado por se cadastrar! Sua oferta exclusiva:</p>
            <a href="{{ profile.offer_link }}" class="offer-link" target="_blank">Acessar Oferta Personalizada</a>
        {% endif %}
    </div>
</body>
</html>
