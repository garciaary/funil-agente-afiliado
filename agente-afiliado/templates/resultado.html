<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Descubra o curso digital ideal para você — Evolução Digital"/>
  <meta property="og:title" content="Seu Resultado — Evolução Digital"/>
  <meta property="og:description" content="Encontramos o conteúdo perfeito para transformar sua vida."/>
  <meta property="og:type" content="website"/>
  <meta name="theme-color" content="#4f46e5"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <title>Seu Resultado — Evolução Digital</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .card { background: white; border-radius: 20px; padding: 48px; max-width: 720px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.10); animation: fadeUp 0.6s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge-perfil { display: inline-flex; align-items: center; gap: 8px; background: #eef2ff; color: #4f46e5; font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 20px; margin-bottom: 24px; animation: fadeUp 0.5s ease 0.1s both; }

    h1 { font-size: 28px; font-weight: 800; color: #1e1b4b; margin-bottom: 12px; line-height: 1.3; animation: fadeUp 0.5s ease 0.15s both; }
    .intro { font-size: 16px; color: #6b7280; line-height: 1.7; margin-bottom: 32px; animation: fadeUp 0.5s ease 0.2s both; }

    .produto-card { border: 2px solid #4f46e5; border-radius: 16px; padding: 28px; margin-bottom: 16px; background: linear-gradient(135deg, #fafaff, #f0f0ff); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); animation: fadeUp 0.5s ease 0.3s both; position: relative; overflow: hidden; }
    .produto-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(79,70,229,0.05), transparent); transition: left 0.5s; }
    .produto-card:hover::before { left: 100%; }
    .produto-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(79,70,229,0.15); }

    .tag { display: inline-block; background: #dcfce7; color: #15803d; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; margin-bottom: 10px; animation: fadeUp 0.5s ease 0.35s both; }
    .tag.popular { background: #fef9c3; color: #854d0e; }

    .produto-title { font-size: 18px; font-weight: 700; color: #1e1b4b; margin-bottom: 6px; }
    .produto-desc  { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 16px; }

    .btn-cta { display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; border-radius: 10px; font-size: 15px; font-weight: 700; text-decoration: none; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
    .btn-cta::after { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.25); transform: translate(-50%, -50%); transition: width 0.4s, height 0.4s; }
    .btn-cta:active::after { width: 300px; height: 300px; }
    .btn-cta:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(79,70,229,0.3); }
    .btn-cta:active { transform: translateY(-1px); }

    .refazer { display: block; text-align: center; margin-top: 32px; font-size: 14px; color: #9ca3af; text-decoration: none; transition: all 0.2s; animation: fadeUp 0.5s ease 0.5s both; }
    .refazer:hover { color: #4f46e5; transform: translateX(-3px); }

    .garantia { display: flex; align-items: center; gap: 10px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 14px 18px; margin-top: 28px; font-size: 13px; color: #15803d; font-weight: 600; animation: fadeUp 0.5s ease 0.4s both; }
  </style>
</head>
<body>
<div class="card">
  <div class="badge-perfil">{{ produto.badge }}</div>
  <h1>{{ produto.titulo }}</h1>
  <p class="intro">{{ produto.intro }}</p>

  <div class="produto-card">
    <span class="tag popular">⭐ Mais indicado</span>
    <div class="produto-title">{{ produto.produto_titulo }}</div>
    <div class="produto-desc">{{ produto.produto_desc }}</div>
    <a href="{{ produto.checkout_link }}" class="btn-cta" target="_blank" rel="noopener">Acessar Conteúdo Recomendado →</a>
  </div>

  <div class="garantia">✅ Garantia de 7 dias — Se não gostar, devolvemos 100% do seu dinheiro.</div>

  <a href="/quiz" class="refazer">← Refazer o quiz</a>
</div>
</body>
</html>
