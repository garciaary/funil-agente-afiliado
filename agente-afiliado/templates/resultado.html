<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Descubra o curso digital ideal para você — Evolução Digital"/>
  <meta property="og:title" content="Seu Resultado — Evolução Digital"/>
  <meta property="og:description" content="Encontramos o conteúdo perfeito para transformar sua vida."/>
  <meta property="og:type" content="website"/>
  <meta name="theme-color" content="#4f46e5"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
  <title>Seu Resultado — Evolução Digital</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .card { background: white; border-radius: 20px; padding: 48px; max-width: 720px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.10); animation: fadeUp 0.5s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge-perfil { display: inline-flex; align-items: center; gap: 8px; background: #eef2ff; color: #4f46e5; font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 20px; margin-bottom: 24px; }

    h1 { font-size: 28px; font-weight: 700; color: #1e1b4b; margin-bottom: 12px; line-height: 1.3; }
    .intro { font-size: 16px; color: #6b7280; line-height: 1.7; margin-bottom: 32px; }

    .produto-card { border: 2px solid #4f46e5; border-radius: 16px; padding: 28px; margin-bottom: 16px; background: #fafafa; transition: transform 0.2s; }
    .produto-card:hover { transform: translateY(-3px); }

    .tag { display: inline-block; background: #dcfce7; color: #15803d; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; margin-bottom: 10px; }
    .tag.popular { background: #fef9c3; color: #854d0e; }

    .produto-title { font-size: 18px; font-weight: 700; color: #1e1b4b; margin-bottom: 6px; }
    .produto-desc  { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 16px; }

    .btn-cta { display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; border-radius: 10px; font-size: 15px; font-weight: 700; text-decoration: none; transition: opacity 0.2s, transform 0.15s; }
    .btn-cta:hover { opacity: 0.9; transform: translateY(-2px); }

    .refazer { display: block; text-align: center; margin-top: 32px; font-size: 14px; color: #9ca3af; text-decoration: none; }
    .refazer:hover { color: #4f46e5; }

    .garantia { display: flex; align-items: center; gap: 10px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 14px 18px; margin-top: 28px; font-size: 13px; color: #15803d; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <div class="badge-perfil">{{ produto.badge }}</div>
  <h1>{{ produto.titulo }}</h1>
  <p class="intro">{{ produto.intro }}</p>

  <div class="produto-card">
    <span class="tag popular">⭐ Mais indicado</span>
    <div class="produto-title">{{ produto.produto_titulo }}</div>
    <div class="produto-desc">{{ produto.produto_desc }}</div>
    <a href="{{ produto.checkout_link }}" class="btn-cta" target="_blank" rel="noopener">Acessar Conteúdo Recomendado →</a>
  </div>

  <div class="garantia">✅ Garantia de 7 dias — Se não gostar, devolvemos 100% do seu dinheiro.</div>

  <a href="/quiz" class="refazer">← Refazer o quiz</a>
</div>
</body>
</html>
