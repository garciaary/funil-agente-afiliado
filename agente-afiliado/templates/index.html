<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funil Agente Afiliado</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.6s ease both; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .btn-pulse:hover { animation: pulse 0.6s infinite alternate; }
        @keyframes pulse {
            from { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
            to { box-shadow: 0 0 0 10px rgba(59,130,246,0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-100 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-slate-800 shadow-lg py-4 px-8 flex items-center justify-center fade-in">
        <div class="flex items-center gap-3">
