<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funil Agente Afiliado</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8edf5 0%, #dce8f5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade1 { animation: fadeInUp 0.5s ease both; }
        .fade2 { animation: fadeInUp 0.5s 0.15s ease both; }
        .fade3 { animation: fadeInUp 0.5s 0.3s ease both; }
        .fade4 { animation: fadeInUp 0.5s 0.45s ease both; }

        header {
            background: #1e293b;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: #3b82f6;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 20px; height: 20px; stroke: white; fill: none; }
        header h1 { color: white; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
        header h1 span { color: #60a5fa; }

        .hero { text-align: center; padding: 52px 20px 24px; }
        .badge {
            display: inline-block;
            background: #dbeafe; color: #2563eb;
            font-size: 13px; font-weight: 600;
            padding: 4px 16px; border-radius: 99px;
            margin-bottom: 16px;
        }
        .hero h2 {
            font-size: 30px; font-weight: 700;
            color: #1e293b; line-height: 1.35;
            margin-bottom: 12px;
        }
        .hero p { color: #64748b; font-size: 15px; max-width: 420px; margin: 0 auto; }

        .benefits {
            display: flex; flex-wrap: wrap;
            justify-content: center; gap: 12px;
            padding: 28px 20px 8px;
        }
        .benefit {
            background: white; border-radius: 12px;
            padding: 10px 18px; font-size: 13px;
            color: #334155; font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            display: flex; align-items: center; gap: 8px;
        }
        .benefit svg { width: 16px; height: 16px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .social { text-align: center; padding: 20px 0 36px; color: #94a3b8; font-size: 14px; }
        .social strong { color: #3b82f6; }

        .cards {
            display: flex; flex-wrap: wrap;
            justify-content: center; gap: 24px;
            padding: 0 24px 60px;
        }
