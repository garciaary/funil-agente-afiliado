<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Afiliado</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
        }
        .column {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .column.left {
            background-color: #ffffff;
        }
        .column.right {
            background-color: #e0f2f7; /* Um azul claro */
        }
        .column h1 {
            color: #2c3e50;
            font-size: 2.8em;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .column p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 600px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 350px;
        }
        .btn {
            display: block;
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }
        .btn-renda {
            background-color: #28a745;
            color: white;
        }
        .btn-saude {
            background-color: #3498db;
            color: white;
        }
        .column img {
            max-width: 80%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            .column {
                flex: 100%;
                padding: 30px;
            }
            .column.left, .column.right {
                padding-top: 60px;
                padding-bottom: 60px;
            }
            .column h1 {
                font-size: 2em;
            }
            .column p {
                font-size: 1em;
            }
            .btn {
                font-size: 16px;
                padding: 12px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Coluna da Esquerda: Textos e Menu de Quizzes -->
        <div class="column left">
            <h1>Torne-se um Agente Afiliado de Sucesso</h1>
            <p>Descubra como você pode começar sua jornada no marketing de afiliados e alcançar a liberdade financeira trabalhando de onde quiser. Escolha uma categoria abaixo para iniciar o teste.</p>
            
            <div class="btn-group">
                <a href="/quiz/renda_extra" class="btn btn-renda">💰 Renda Extra & Marketing</a>
                <a href="/quiz/saude" class="btn btn-saude">🌱 Saúde & Bem-Estar</a>
            </div>
        </div>
        
        <!-- Coluna da Direita: Sua imagem em formato PNG -->
        <div class="column right">
            <img src="{{ url_for('static', filename='home-office.png') }}" alt="Pessoa trabalhando em home office">
        </div>
    </div>
</body>
</html>
